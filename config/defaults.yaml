# Self-Improving Engineering AI — Layer 0 Defaults
# All values here are the system defaults. Overrides go in config.yaml.

system:
  name: self_improving_ai
  version: "0.1.0"
  max_cycles: 100000
  log_level: INFO
  data_dir: data/
  
llm:
  default_model: claude-sonnet-4-6
  fallback_model: claude-haiku-4-5-20251001
  max_retries: 3
  timeout_seconds: 60
  temperature: 0.0
  max_tokens: 8192
  rate_limit_rpm: 60
  cost_per_1k_prompt_tokens: 0.003
  cost_per_1k_completion_tokens: 0.015
  economy_model: claude-haiku-4-5-20251001
  economy_temperature: 0.0
  economy_max_tokens: 4096
  api_provider: anthropic
  api_base: "https://api.anthropic.com/v1"

sandbox:
  default_type: subprocess
  timeout_seconds: 30
  memory_limit_mb: 256
  allowed_imports: []
  blocked_imports:
    - os
    - subprocess
    - sys
    - shutil
    - socket
    - requests
    - urllib
  docker_image: "python:3.11-slim"
  docker_memory_mb: 512
  docker_timeout_seconds: 60
  qemu:
    image_path: ""
    memory_mb: 512
    cpu_cores: 1
    timeout_seconds: 120
    snapshot_before_run: true
    network_enabled: false
    arch: x86_64

budget:
  monthly_budget_usd: 100.0
  daily_limit_usd: 10.0
  cycle_limit_usd: 1.0
  economy_mode_threshold: 0.30
  alert_threshold_percent: 0.80
  track_per_model: true

scoring:
  correctness_weight: 0.4
  efficiency_weight: 0.2
  readability_weight: 0.2
  maintainability_weight: 0.1
  test_coverage_weight: 0.1
  promotion_threshold: 0.75
  minimum_test_pass: 1.0

curriculum:
  starting_level: F1
  promotion_threshold: 0.85
  demotion_threshold: 0.40
  cycles_before_promotion_check: 50
  exploration_budget_percent: 0.10
  max_directed_queue: 20

failure:
  chain_detection_window: 10
  min_chain_length: 3
  severity_escalation_threshold: 5
  max_active_chains: 50
  narrative_model: ""
  root_cause_depth: 5

strategy:
  max_active_strategies: 10
  probation_cycles: 100
  confirmation_threshold: 0.05
  rollback_threshold: -0.05
  pattern_min_applications: 5
  pattern_validation_threshold: 0.60
  meta_review_interval: 100
  trigger_cooldown: 50

agents:
  max_agents: 5
  min_training_cycles: 50
  probation_cycles: 50
  probation_margin: 0.05
  auto_dissolve_below: 0.30
  merge_similarity_threshold: 0.80
  communication_enabled: true
  max_messages_per_cycle: 10

benchmarks:
  enabled: true
  interval_cycles: 1000
  benchmark_dir: "benchmarks/"
  anonymous_feeding: true
  isolation_checks: true
  swe_bench_enabled: false

observability:
  trace_enabled: true
  digest_interval: 100
  alert_retention_cycles: 10000
  max_active_alerts: 100
  health_check_interval: 10

graduation:
  exam_allocation: 0.25
  consecutive_sessions: 15
  exam_size: 200
  default_gate_pass_rates:
    G1: 0.92
    G2: 0.94
    G3: 0.96
    G4: 0.97
    G5: 0.98

optimization:
  enabled: true
  max_candidates: 3
  auto_apply_threshold: 0.90
  dimensions:
    - runtime
    - readability

exploration:
  enabled: true
  budget_percent: 0.10
  max_risk_score: 0.80
  min_expected_learning: 0.30

compression:
  warm_tier_cycles: 10
  cold_tier_cycles: 100
  enabled: true

safety:
  max_invariant_violations: 3
  halt_on_violation: true
  monitored_violation_types:
    - filesystem_access
    - network_access
    - env_access

recovery:
  max_retries: 3
  backoff_multiplier: 2.0
  max_backoff_seconds: 300

# =============================================================================
# === Multi-Track Domain Expansion (Section 9.1) ===
# =============================================================================
tracks:
  enabled: false
  initial_active_tracks: [CORE_ALGORITHMS]
  max_active_tracks: 3
  rebalance_interval_cycles: 500
  stagnation_threshold_cycles: 2000
  stagnation_improvement_threshold: 0.02
  warmup_cycles_per_track: 200
  activation_cooldown_cycles: 2000
  max_consecutive_crashes_before_pause: 5
  overnight_focus_mode: false
  overnight_focus_threshold: 0.15
  readiness_check_interval_cycles: 500

  # ---------------------------------------------------------------------------
  # Cycle scheduling: how cycles are distributed across active tracks.
  # ---------------------------------------------------------------------------
  scheduling:
    algorithm: WEIGHTED_ROUND_ROBIN
    rebalance_strategy: PROPORTIONAL
    period_length_cycles: 100
    min_consecutive_same_track: 5
    max_consecutive_same_track: 50
    priority_weight_performance: 0.3
    priority_weight_stagnation: 0.4
    priority_weight_graduation_proximity: 0.3

  # ---------------------------------------------------------------------------
  # Per-track graduation settings.
  # system_graduation_rule: PRIMARY_TRACK means CORE_ALGORITHMS drives the
  # system tier; other tracks can be ahead or behind.
  # ---------------------------------------------------------------------------
  graduation:
    independent_gates: true
    system_graduation_rule: PRIMARY_TRACK
    exam_allocation_default: 0.25
    consecutive_sessions_default: 15
    exam_size_default: 200
    pause_on_python_drop: true
    python_safety_threshold: 0.90
    auto_graduation_trigger_threshold: 0.05
    auto_graduation_sustained_cycles: 200
    ceiling_detection_enabled: true
    ceiling_stall_cycles: 3000
    ceiling_min_pass_rate_for_override: 0.65

  # ---------------------------------------------------------------------------
  # Cross-domain pattern transfer settings.
  # ---------------------------------------------------------------------------
  cross_domain:
    transfer_enabled: true
    min_pattern_effectiveness: 0.60
    transfer_confidence_threshold: 0.75
    max_transfers_per_period: 10
    assessment_interval_cycles: 500
    min_pattern_applications: 5
    min_generalization_quality: 0.30

  # ---------------------------------------------------------------------------
  # Track readiness criteria — default thresholds evaluated before activating
  # any new track.
  # ---------------------------------------------------------------------------
  readiness_criteria:
    min_prerequisite_pass_rate: 0.85
    min_prerequisite_cycles: 1000
    min_language_pass_rate: 0.70
    min_language_cycles: 500
    require_all_languages: false
    min_pattern_depth: 0.40
    min_budget_headroom_percent: 0.15
    cooldown_after_last_activation_cycles: 2000

  # ---------------------------------------------------------------------------
  # Per-track definitions (Section 9.3)
  # Fields: priority, min_activation_tier, primary_language,
  #         required_languages, prerequisite_tracks,
  #         estimated_avg_cost_per_cycle, graduation_gates
  # Placeholder/DEFERRED tracks have no gates — they are not activatable until
  # approaching their min_activation_tier.
  # ---------------------------------------------------------------------------
  definitions:

    # -------------------------------------------------------------------------
    # Tier 1 — always available from boot
    # -------------------------------------------------------------------------
    CORE_ALGORITHMS:
      display_name: "Core Algorithms"
      description: "Foundational algorithms and data structures"
      priority: CRITICAL
      min_activation_tier: 1
      primary_language: PYTHON
      required_languages: [PYTHON]
      prerequisite_tracks: []
      estimated_avg_cost_per_cycle: 0.05
      graduation_gates:
        G1: { pass_rate: 0.92, sessions: 15, exam_size: 200 }
        G2: { pass_rate: 0.94, sessions: 15, exam_size: 200 }
        G3: { pass_rate: 0.96, sessions: 15, exam_size: 200 }

    AI_ML:
      display_name: "AI / Machine Learning"
      description: "Machine learning, neural networks, NLP, computer vision"
      priority: CRITICAL
      min_activation_tier: 1
      primary_language: PYTHON
      required_languages: [PYTHON]
      prerequisite_tracks: []
      estimated_avg_cost_per_cycle: 0.08
      graduation_gates:
        G1: { pass_rate: 0.88, sessions: 15, exam_size: 200 }
        G2: { pass_rate: 0.91, sessions: 15, exam_size: 200 }
        G3: { pass_rate: 0.94, sessions: 15, exam_size: 200 }

    # -------------------------------------------------------------------------
    # Tier 2 — activatable after CORE_ALGORITHMS is ACTIVE
    # -------------------------------------------------------------------------
    WEB_DEV:
      display_name: "Web Development"
      description: "Frontend, backend, full-stack web development"
      priority: HIGH
      min_activation_tier: 2
      primary_language: PYTHON
      required_languages: [PYTHON, JAVASCRIPT, TYPESCRIPT]
      prerequisite_tracks: [CORE_ALGORITHMS]
      estimated_avg_cost_per_cycle: 0.08
      graduation_gates:
        G1: { pass_rate: 0.85, sessions: 15, exam_size: 200 }
        G2: { pass_rate: 0.89, sessions: 15, exam_size: 200 }
        G3: { pass_rate: 0.93, sessions: 15, exam_size: 200 }

    API_MICROSERVICES:
      display_name: "API & Microservices"
      description: "REST, GraphQL, gRPC, service mesh, API design"
      priority: HIGH
      min_activation_tier: 2
      primary_language: PYTHON
      required_languages: [PYTHON, GO]
      prerequisite_tracks: [CORE_ALGORITHMS]
      estimated_avg_cost_per_cycle: 0.08
      graduation_gates:
        G1: { pass_rate: 0.85, sessions: 15, exam_size: 200 }
        G2: { pass_rate: 0.89, sessions: 15, exam_size: 200 }
        G3: { pass_rate: 0.93, sessions: 15, exam_size: 200 }

    # -------------------------------------------------------------------------
    # Tier 3 — activatable after relevant prerequisites are ACTIVE
    # -------------------------------------------------------------------------
    DATA_ENGINEERING:
      display_name: "Data Engineering"
      description: "ETL, data pipelines, warehousing, streaming"
      priority: HIGH
      min_activation_tier: 3
      primary_language: PYTHON
      required_languages: [PYTHON, SQL]
      prerequisite_tracks: [CORE_ALGORITHMS]
      estimated_avg_cost_per_cycle: 0.10
      graduation_gates:
        G1: { pass_rate: 0.83, sessions: 15, exam_size: 200 }
        G2: { pass_rate: 0.87, sessions: 15, exam_size: 200 }
        G3: { pass_rate: 0.92, sessions: 15, exam_size: 200 }

    SECURITY:
      display_name: "Security"
      description: "Application security, cryptography, threat modeling"
      priority: MEDIUM
      min_activation_tier: 3
      primary_language: PYTHON
      required_languages: [PYTHON, C]
      prerequisite_tracks: [CORE_ALGORITHMS, WEB_DEV]
      estimated_avg_cost_per_cycle: 0.12
      graduation_gates:
        G1: { pass_rate: 0.80, sessions: 15, exam_size: 200 }
        G2: { pass_rate: 0.85, sessions: 15, exam_size: 200 }
        G3: { pass_rate: 0.90, sessions: 15, exam_size: 200 }

    DEVOPS:
      display_name: "DevOps"
      description: "CI/CD, infrastructure as code, containers, orchestration"
      priority: LOW
      min_activation_tier: 3
      primary_language: PYTHON
      required_languages: [PYTHON, BASH]
      prerequisite_tracks: [CORE_ALGORITHMS, API_MICROSERVICES]
      estimated_avg_cost_per_cycle: 0.08
      graduation_gates:
        G1: { pass_rate: 0.80, sessions: 15, exam_size: 200 }
        G2: { pass_rate: 0.85, sessions: 15, exam_size: 200 }
        G3: { pass_rate: 0.90, sessions: 15, exam_size: 200 }

    # -------------------------------------------------------------------------
    # Tier 4
    # -------------------------------------------------------------------------
    NETWORKING:
      display_name: "Networking"
      description: "TCP/IP, protocols, network programming, distributed networking"
      priority: MEDIUM
      min_activation_tier: 4
      primary_language: PYTHON
      required_languages: [PYTHON, C]
      prerequisite_tracks: [CORE_ALGORITHMS, OS]
      estimated_avg_cost_per_cycle: 0.15
      graduation_gates:
        G1: { pass_rate: 0.80, sessions: 15, exam_size: 200 }
        G2: { pass_rate: 0.85, sessions: 15, exam_size: 200 }
        G3: { pass_rate: 0.90, sessions: 15, exam_size: 200 }

    GAME_DEV:
      display_name: "Game Development"
      description: "Game engines, physics, rendering, game AI"
      priority: LOW
      min_activation_tier: 4
      primary_language: PYTHON
      required_languages: [PYTHON, CPP]
      prerequisite_tracks: [CORE_ALGORITHMS]
      estimated_avg_cost_per_cycle: 0.10
      graduation_gates:
        G1: { pass_rate: 0.80, sessions: 15, exam_size: 200 }
        G2: { pass_rate: 0.85, sessions: 15, exam_size: 200 }
        G3: { pass_rate: 0.90, sessions: 15, exam_size: 200 }

    DATABASE_INTERNALS:
      display_name: "Database Internals"
      description: "Storage engines, query optimization, indexing, transactions"
      priority: DEFERRED
      min_activation_tier: 4
      primary_language: C
      required_languages: [C, SQL]
      prerequisite_tracks: [DATA_ENGINEERING, CORE_ALGORITHMS]
      estimated_avg_cost_per_cycle: 0.20
      # No gates — placeholder; not activatable until approaching tier

    MOBILE_DEV:
      display_name: "Mobile Development"
      description: "iOS, Android, cross-platform mobile development"
      priority: DEFERRED
      min_activation_tier: 4
      primary_language: KOTLIN
      required_languages: [KOTLIN, SWIFT]
      prerequisite_tracks: [WEB_DEV, API_MICROSERVICES]
      estimated_avg_cost_per_cycle: 0.10
      # No gates — placeholder

    # -------------------------------------------------------------------------
    # Tier 5 — DEFERRED
    # -------------------------------------------------------------------------
    OS:
      display_name: "Operating Systems"
      description: "Kernel development, system calls, memory management, scheduling"
      priority: DEFERRED
      min_activation_tier: 5
      primary_language: C
      required_languages: [C, ASSEMBLY]
      prerequisite_tracks: [CORE_ALGORITHMS, SECURITY]
      estimated_avg_cost_per_cycle: 0.30
      graduation_gates:
        G1: { pass_rate: 0.75, sessions: 15, exam_size: 200 }
        G2: { pass_rate: 0.82, sessions: 15, exam_size: 200 }
        G3: { pass_rate: 0.88, sessions: 15, exam_size: 200 }

    COMPILER_DESIGN:
      display_name: "Compiler Design"
      description: "Lexers, parsers, ASTs, code generation, optimization passes"
      priority: DEFERRED
      min_activation_tier: 5
      primary_language: PYTHON
      required_languages: [PYTHON, C]
      prerequisite_tracks: [CORE_ALGORITHMS, DATA_ENGINEERING]
      estimated_avg_cost_per_cycle: 0.15
      # No gates — placeholder

    DISTRIBUTED_SYSTEMS:
      display_name: "Distributed Systems"
      description: "Consensus, replication, partitioning, distributed databases"
      priority: DEFERRED
      min_activation_tier: 5
      primary_language: GO
      required_languages: [GO, PYTHON]
      prerequisite_tracks: [NETWORKING, API_MICROSERVICES]
      estimated_avg_cost_per_cycle: 0.25
      # No gates — placeholder

    # -------------------------------------------------------------------------
    # Tier 6 — DEFERRED (furthest future)
    # -------------------------------------------------------------------------
    EMBEDDED_SYSTEMS:
      display_name: "Embedded Systems"
      description: "Firmware, real-time systems, hardware interfaces"
      priority: DEFERRED
      min_activation_tier: 6
      primary_language: C
      required_languages: [C, ASSEMBLY]
      prerequisite_tracks: [OS, NETWORKING]
      estimated_avg_cost_per_cycle: 0.40
      # No gates — placeholder

# =============================================================================
# === Task Self-Generation (Section 9.2) ===
# =============================================================================
task_generation:
  enabled: true
  min_acceptance_rate: 0.70
  min_novelty_score: 0.30
  verification_attempts_per_task: 3
  revocation_cooldown_cycles: 2000
  max_generated_per_batch: 10
  human_review_on_revocation: true
